description: >-
  Sephora is a French multinational chain of personal care and beauty stores
  and a subsidiary of LVMH, operating 2,700+ locations worldwide and a
  large ecommerce footprint. Sephora does not publish a public developer
  API and does not maintain a public GitHub organization. The Sephora
  storefront and Beauty Insider loyalty program are accessed only through
  consumer apps and the website; affiliate marketing partnerships are
  brokered through third-party networks such as Rakuten Advertising and
  Skimlinks rather than a Sephora-owned API.
